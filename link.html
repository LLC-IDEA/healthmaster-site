<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HealthMaster — вход</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #ecfdf5; color: #064e3b; display: flex; align-items: center;
         justify-content: center; min-height: 100vh; padding: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 32px; max-width: 360px;
          width: 100%; text-align: center; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .logo { font-size: 56px; margin-bottom: 12px; }
  h1 { font-size: 22px; margin-bottom: 8px; color: #064e3b; }
  p { font-size: 14px; color: #047857; line-height: 1.5; margin-bottom: 20px; }
  .btn { display: inline-block; background: #10b981; color: #fff; padding: 14px 28px;
         border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 15px;
         width: 100%; }
  .btn:active { background: #059669; }
  .hint { font-size: 12px; color: #6b7280; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🍏</div>
  <h1>Открываем HealthMaster…</h1>
  <p id="status">Если приложение не открылось автоматически — нажми кнопку ниже.</p>
  <a href="#" id="openBtn" class="btn">Открыть приложение</a>
  <p class="hint">
    Приложение не установлено?
    <a href="https://play.google.com/store/apps/details?id=app.healthmaster.android"
       style="color:#10b981">Скачать в Google Play</a>
  </p>
</div>
<script>
(function () {
  var token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('status').textContent =
      'Ссылка устарела или некорректна. Запроси новую через /web в боте.';
    document.getElementById('openBtn').style.display = 'none';
    return;
  }
  var deeplink = 'healthmaster://link?token=' + encodeURIComponent(token);
  document.getElementById('openBtn').setAttribute('href', deeplink);
  window.location.href = deeplink;
})();
</script>
</body>
</html>
