<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата — HealthMaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://yookassa.ru/checkout-widget/v1/checkout-widget.js"></script>
    <style>
        .pay-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px;
        }

        .pay-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            text-align: center;
        }

        #payment-form {
            width: 100%;
            max-width: 480px;
            min-height: 400px;
        }

        .pay-status {
            max-width: 480px;
            margin: 24px auto;
            padding: 20px 24px;
            border-radius: 14px;
            text-align: center;
            line-height: 1.5;
        }

        .pay-status.error {
            background: rgba(255, 80, 80, 0.1);
            border: 1px solid rgba(255, 80, 80, 0.3);
        }

        .pay-status.success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .pay-tg-link {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: #fff !important;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="glass-container">
        <header>
            <div class="logo">
                <span class="logo-emoji">🥗</span>
                <h1>HealthMaster</h1>
            </div>
        </header>

        <section class="pay-wrapper">
            <div class="pay-title">Оплата подписки</div>
            <div id="payment-form"></div>
            <div id="pay-status" class="pay-status" style="display:none;"></div>
        </section>
    </main>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const returnUrl = 'https://t.me/AIHealthMasterBot';
            const statusEl = document.getElementById('pay-status');

            function showStatus(type, html) {
                statusEl.className = 'pay-status ' + type;
                statusEl.innerHTML = html;
                statusEl.style.display = 'block';
                // При статусе скрываем контейнер виджета, чтобы не было пустого места.
                document.getElementById('payment-form').style.display = 'none';
            }

            if (!token) {
                showStatus('error',
                    'Ссылка на оплату повреждена или устарела.<br>' +
                    'Вернитесь в бот и нажмите «Оплатить» ещё раз.' +
                    '<br><a class="pay-tg-link" href="' + returnUrl + '">Вернуться в Telegram</a>'
                );
                return;
            }

            if (token.indexOf('mock_') === 0) {
                showStatus('success',
                    '<b>Mock-режим:</b> реальная оплата не производится.' +
                    '<br><a class="pay-tg-link" href="' + returnUrl + '">Вернуться в Telegram</a>'
                );
                return;
            }

            try {
                // Виджет с заданным return_url сам редиректит юзера после оплаты
                // (успех или отказ — оба ведут на t.me/AIHealthMasterBot).
                // on('success')/on('fail') здесь не нужны — они срабатывают только
                // без return_url, а нам удобнее бесшовный возврат в бот.
                const checkout = new window.YooMoneyCheckoutWidget({
                    confirmation_token: token,
                    return_url: returnUrl,
                    customization: {
                        // Только форма карты — Sber ID и ЮMoney-login не отображаются.
                        payment_methods: ['bank_card'],
                        colors: {
                            control_primary: '#4CAF50',
                            background: '#1a1f2e'
                        }
                    },
                    error_callback: function (error) {
                        console.error('Widget error:', error);
                        showStatus('error',
                            'Не удалось загрузить форму оплаты.<br>' +
                            'Если у вас включён VPN или блокировщик рекламы — отключите их и обновите страницу.<br>' +
                            'Или вернитесь в бот и запросите оплату заново.' +
                            '<br><a class="pay-tg-link" href="' + returnUrl + '">Вернуться в Telegram</a>'
                        );
                    }
                });

                checkout.render('payment-form');
            } catch (e) {
                console.error('Checkout init error:', e);
                showStatus('error',
                    'Ошибка при загрузке формы оплаты.<br>' +
                    'Если у вас включён VPN или блокировщик рекламы — отключите их и обновите страницу.<br>' +
                    'Либо вернитесь в бот и попробуйте ещё раз.' +
                    '<br><a class="pay-tg-link" href="' + returnUrl + '">Вернуться в Telegram</a>'
                );
            }
        })();
    </script>
</body>

</html>
